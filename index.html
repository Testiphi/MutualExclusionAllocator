<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>狂野飙车9 · 擂台选车小助手</title>
    <style>
        * {
            box-sizing: border-box;
            font-family: system-ui, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
        }
        body {
            background: #0b0f17;
            margin: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .card {
            max-width: 1280px;
            width: 100%;
            background: #111827;
            border-radius: 32px;
            padding: 24px 28px;
            border: 1px solid #2a3650;
            box-shadow: 0 20px 35px rgba(0,0,0,0.5);
        }
        h1 {
            color: #f7d44a;
            font-size: 1.9rem;
            margin: 0 0 6px 0;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        /* 四区/五区切换开关 */
        .zone-toggle {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 20px;
            padding: 0 0 0 22px;
        }
        .zone-toggle label {
            color: #9aa9ce;
            font-size: 0.85rem;
            font-weight: 500;
            cursor: pointer;
            user-select: none;
            padding: 6px 16px;
            border-radius: 40px;
            border: 1px solid #3a4880;
            background: #0f1624;
            transition: all .2s;
        }
        .zone-toggle label.active {
            background: #f3bc3c;
            color: #0e1422;
            border-color: #ffdf8c;
            font-weight: 700;
            box-shadow: 0 0 6px #f5bc3c;
        }
        .zone-toggle label.inactive {
            opacity: 0.5;
        }
        .zone-toggle label.inactive:hover {
            opacity: 0.8;
            border-color: #4f639a;
        }
        .car-tag.disabled {
            opacity: 0.35;
            cursor: not-allowed;
            border-color: #2a3857;
        }
        /* ===== 副标题 ===== */
        .sub {
            color: #9aa9ce;
            margin-bottom: 28px;
            border-left: 4px solid #e6b422;
            padding-left: 18px;
            font-size: 0.9rem;
        }
        /* ===== 地图选择行 ===== */
        .map-rows {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 28px;
        }
        .map-row {
            display: flex;
            align-items: center;
            gap: 14px;
            background: #0f1624;
            padding: 10px 18px;
            border-radius: 60px;
            border: 1px solid #2a3857;
        }
        .map-index {
            width: 36px; height: 36px;
            background: #1f2a44;
            color: #ffde9c;
            border-radius: 40px;
            display: flex; align-items: center; justify-content: center;
            font-weight: bold;
            font-size: 1.2rem;
            flex-shrink: 0;
        }
        .map-select-group {
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
            flex: 1;
        }
        .select-wrapper {
            flex: 1 1 210px;
            min-width: 170px;
        }
        .select-wrapper label {
            display: block;
            font-size: 0.7rem;
            color: #8f9ec7;
            margin-bottom: 4px;
            font-weight: 500;
        }
        select {
            width: 100%;
            padding: 10px 14px;
            background: #030617;
            border: 1px solid #3a4880;
            color: #f0f4ff;
            border-radius: 34px;
            font-size: 0.88rem;
            cursor: pointer;
            appearance: none;
            background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='16' height='16' viewBox='0 0 24 24' fill='none' stroke='%2393a5df' stroke-width='2'><polyline points='6 9 12 15 18 9'/></svg>");
            background-repeat: no-repeat;
            background-position: right 14px center;
            background-size: 14px;
        }
        select:focus {
            border-color: #f5c542;
            outline: none;
        }
        select:disabled {
            opacity: 0.6;
        }
        /* ===== 车库区域 ===== */
        .garage {
            background: #0e1627;
            border-radius: 32px;
            padding: 18px 20px;
            margin: 18px 0 24px;
            border: 1px solid #29385c;
        }
        .garage-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-bottom: 14px;
            flex-wrap: wrap;
            gap: 10px;
        }
        .garage-header h2 {
            margin: 0;
            font-size: 1.3rem;
            font-weight: 600;
            color: #dbe4ff;
        }
        .garage-actions {
            display: flex;
            gap: 12px;
        }
        .garage-btn {
            background: #202a42;
            border: 1px solid #4f639a;
            color: #f2e9c7;
            padding: 5px 18px;
            border-radius: 40px;
            font-size: 0.8rem;
            cursor: pointer;
        }
        .garage-btn:hover {
            background: #2f3e66;
            border-color: #f5c542;
        }
        .car-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            max-height: 270px;
            overflow-y: auto;
            padding: 8px 6px;
            background: #070c18;
            border-radius: 34px;
            border: 1px solid #253153;
        }
        .car-tag {
            background: #18203a;
            color: #cbd9ff;
            padding: 6px 16px;
            border-radius: 60px;
            font-size: 0.85rem;
            border: 1px solid #40548b;
            cursor: pointer;
            user-select: none;
        }
        .car-tag.selected {
            background: #f3bc3c;
            color: #0e1422;
            border-color: #ffdf8c;
            font-weight: 700;
            box-shadow: 0 0 6px #f5bc3c;
        }
        .class-filter {
            display: flex;
            gap: 6px;
            margin-bottom: 10px;
            flex-wrap: wrap;
        }
        .class-filter-btn {
            background: #18203a;
            color: #8f9ec7;
            padding: 4px 14px;
            border-radius: 60px;
            font-size: 0.8rem;
            border: 1px solid #40548b;
            cursor: pointer;
            user-select: none;
            font-weight: 600;
        }
        .class-filter-btn.active {
            background: #f3bc3c;
            color: #0e1422;
            border-color: #ffdf8c;
            box-shadow: 0 0 4px #f5bc3c;
        }
        .class-filter-btn:hover {
            border-color: #f5c542;
        }
        .garage-search {
            width: 100%;
            padding: 10px 18px;
            background: #030617;
            border: 1px solid #3a4880;
            color: #f0f4ff;
            border-radius: 34px;
            font-size: 0.85rem;
            outline: none;
            margin-bottom: 12px;
            box-sizing: border-box;
        }
        .garage-search:focus {
            border-color: #f5c542;
        }
        .garage-search::placeholder {
            color: #5a6c9f;
        }
        /* ===== 搜索无匹配提示 ===== */
        .no-match {
            color: #6a7db0;
            text-align: center;
            width: 100%;
            padding: 20px;
            font-size: 0.9rem;
        }
        /* ===== 生成按钮 ===== */
        .action {
            text-align: center;
            margin: 18px 0 24px;
        }
        .recommend-btn {
            background: linear-gradient(115deg, #f0b429, #cf951e);
            border: none;
            color: #0c1120;
            font-weight: bold;
            font-size: 1.35rem;
            padding: 14px 42px;
            border-radius: 70px;
            border-bottom: 3px solid #9b6f18;
            cursor: pointer;
            box-shadow: 0 6px 12px rgba(0,0,0,0.4);
        }
        .recommend-btn:hover {
            background: linear-gradient(115deg, #ffcd5a, #e6a82a);
            transform: scale(0.98);
        }
        /* ===== 结果面板 ===== */
        .result-panel {
            background: #0f1628;
            border-radius: 32px;
            padding: 20px 22px;
            border: 1px solid #2f3f6b;
        }
        .result-title {
            color: #cddcff;
            margin-bottom: 16px;
            font-size: 1.1rem;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .scheme-selector {
            margin-bottom: 22px;
            display: flex;
            align-items: center;
            gap: 15px;
            flex-wrap: wrap;
        }
        .scheme-selector label {
            color: #bacaee;
            font-weight: 500;
        }
        .scheme-selector select {
            width: auto;
            min-width: 380px;
            background: #121b32;
            border-color: #536cac;
        }
        .result-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 16px;
        }
        .result-item {
            background: #141e38;
            border-radius: 28px;
            padding: 14px 8px;
            text-align: center;
            border: 1px solid #2e4278;
        }
        .result-map {
            font-weight: 700;
            color: #f2e4b3;
            font-size: 1rem;
            margin-bottom: 6px;
        }
        .result-bigmap {
            font-size: 0.7rem;
            color: #8b9ad4;
            margin-bottom: 12px;
            text-transform: uppercase;
        }
        .result-car {
            background: #1f2c54;
            padding: 9px 0;
            border-radius: 60px;
            font-weight: 800;
            color: #f8df96;
            border: 1px solid #6b86c9;
            font-size: 0.95rem;
        }
        .result-car.empty {
            background: #182040;
            color: #7f8bbd;
            border: 1px dashed #5b6fa5;
        }
        .priority-badge {
            font-size: 0.65rem;
            background: #01040e60;
            border-radius: 30px;
            display: inline-block;
            margin-top: 6px;
            color: #b7c5ff;
            padding: 2px 8px;
        }
        .footer-note {
            color: #596b9b;
            text-align: right;
            margin-top: 14px;
            font-size: 0.75rem;
        }
        .badge-pareto {
            background: #2c3e6b;
            color: #ffd966;
            border-radius: 40px;
            font-size: 0.7rem;
            padding: 2px 10px;
            margin-left: 12px;
            font-weight: normal;
        }
        /* ===== 加载动画遮罩 ===== */
        .loading-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.5);
            justify-content: center; align-items: center;
            z-index: 999;
        }
        .loading-overlay.show { display: flex; }
        .loading-box {
            background: #111827;
            border: 1px solid #2a3650;
            border-radius: 32px;
            padding: 40px 60px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.6);
        }
        .loading-spinner {
            width: 50px; height: 50px;
            border: 4px solid #2a3650;
            border-top: 4px solid #f7d44a;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 16px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .loading-box p { color: #cddcff; font-size: 1rem; margin: 12px 0 0; }
        .result-score {
            font-size: 0.75rem;
            color: #83a0d8;
            margin-top: 2px;
        }
    </style>
</head>
<body>
<div class="card">
    <div class="loading-overlay" id="loadingOverlay">
        <div class="loading-box">
            <div class="loading-spinner"></div>
            <p>🔄 正在计算最优方案...</p>
        </div>
    </div>

    <h1>🏆 擂台选车助手</h1>
    <div class="sub">🚀 帕累托最优分配 | 每张图优先级数值越小越强 | 仅显示不可被其他方案全面超越的策略</div>

    <div class="zone-toggle" id="zoneToggle">
        <label data-zone="zone5" class="active">🏁 五区</label>
        <label data-zone="zone4" class="inactive">🔄 四区</label>
    </div>

    <div class="map-rows" id="mapRowsContainer"></div>

    <div class="garage">
        <div class="garage-header">
            <h2 id="garageTitle">🚘 我的车库</h2>
            <div class="garage-actions">
                <span class="garage-btn" id="selectAllBtn">✔ 全部点亮</span>
                <span class="garage-btn" id="clearAllBtn">✖ 全部清空</span>
                <span class="garage-btn" id="sortBtn">📊 默认</span>
            </div>
        </div>
        <input class="garage-search" id="garageSearch" type="text" placeholder="🔍 搜索车辆(支持昵称/真名)..." autocomplete="off">
        <div class="class-filter" id="classFilter">
            <span class="class-filter-btn active" data-class="">全部</span>
            <span class="class-filter-btn" data-class="R">R</span>
            <span class="class-filter-btn" data-class="S">S</span>
            <span class="class-filter-btn" data-class="A">A</span>
            <span class="class-filter-btn" data-class="B">B</span>
            <span class="class-filter-btn" data-class="C">C</span>
            <span class="class-filter-btn" data-class="D">D</span>
        </div>
        <div class="car-grid" id="carGrid"></div>
    </div>

    <div class="action">
        <button class="recommend-btn" id="recommendBtn">✨ 生成方案 ✨</button>
    </div>

    <div class="result-panel">
        <div class="result-title">
            📌 一个可能的方案
            <span class="badge-pareto" id="schemeCountBadge">0</span>
        </div>
        <div class="scheme-selector">
            <label for="schemeSelect">🏅 选择方案:</label>
            <select id="schemeSelect"></select>
        </div>
        <div class="result-grid" id="resultGrid"></div>
        <div class="footer-note">给出的首个方案不一定为最优,需根据自身情况选择更好的方案</div>
    </div>
</div>

<script>
(function() {
/** ====================================================================
 *  架构概览
 *    1) 数据层 —— data.json（赛道+优先级）+ cars.json（性能+昵称映射）
 *    2) UI 层  —— 动态渲染地图行、车库网格、结果面板
 *    3) 算法层  —— 回溯枚举分配 → 帕累托非支配排序
 *    4) 持久化  —— localStorage（车库选中状态 + 四/五区模式）
 * ===================================================================== */

    // 当前模式: 'zone5' | 'zone4'
    let currentZone = 'zone5';

    let RACE_DATA = null;
    let bigMapList = [];
    let smallMapsByBig = {};

    // ===================== 五区 / 四区 独立车池（硬编码，可自由增删） =====================
    const ZONE5_CARS = [
        "007s",
        "21c",
        "300+",
        "499p",
        "5n",
        "600lt",
        "650s",
        "9x8",
        "att",
        "b95",
        "c1",
        "c2",
        "cc850",
        "cs",
        "divo",
        "er9",
        "f5",
        "f5r",
        "fe3",
        "fp1",
        "gtr50",
        "ps龙",
        "r兔",
        "r牛",
        "sf90",
        "sgt",
        "ssc",
        "ts900",
        "t牛",
        "urs",
        "万达",
        "六子",
        "冬王",
        "塞纳",
        "复仇",
        "大超",
        "小牛",
        "小自燃",
        "小蜥蜴",
        "帕梅",
        "恶魔",
        "杰哥",
        "杰弟",
        "杰皇",
        "法拉第",
        "火山",
        "爱音",
        "狼崽",
        "狼王",
        "猫头鹰",
        "玻璃",
        "电牛",
        "白龙",
        "秋王",
        "红秋王",
        "纳兰",
        "统治",
        "肥龙",
        "自燃",
        "自私",
        "英灵殿",
        "莫斯勒",
        "速尾",
        "银电",
        "霓虹gtr",
        "风扇",
        "风龙",
        "黑龙",
];
    const ZONE4_CARS = [
        "21c", "5n", "600lt", "9x8", "c2",
        "f5", "fe3", "fp1", "sf90", "sgt",
        "ssc", "ts900", "urs", "万达", "塞纳",
        "复仇", "大超", "小牛", "恶魔", "杰哥",
        "法拉第", "火山", "狼崽", "狼王", "玻璃",
        "秋王", "肥龙", "英灵殿", "莫斯勒",
        "速尾", "风扇",
        "爱音"
    ];



    // zone5Cars / zone4Cars 直接引用上方常量（无需副本）
    const zone5Cars = ZONE5_CARS;
    const zone4Cars = ZONE4_CARS;

    // 车辆度量数据 (cars.json 动态加载后填充)
    let carStats = {};         // 真车名 → { score, max_speed, ... }
    let nickToName = {};       // 昵称 → 真车名
    let sortMode = 'alpha';    // 'alpha' | 'score-desc' | 'score-asc'
    let filterClass = null;    // null = 全部, 或 'S','A','B','C','D','R' 之一

    // DOM 元素
    const mapRowsContainer = document.getElementById('mapRowsContainer');
    const carGrid = document.getElementById('carGrid');
    const selectAllBtn = document.getElementById('selectAllBtn');
    const clearAllBtn = document.getElementById('clearAllBtn');
    const recommendBtn = document.getElementById('recommendBtn');
    const schemeSelect = document.getElementById('schemeSelect');
    const resultGrid = document.getElementById('resultGrid');
    const schemeCountBadge = document.getElementById('schemeCountBadge');
    const loadingOverlay = document.getElementById('loadingOverlay');

    const ROWS = 5;

    let bigSelects = [];
    let smallSelects = [];

    let selectedCars = new Set();            // 车库拥有车辆
    let searchQuery = '';                    // 车库搜索关键字
    let currentBestSchemes = [];             // 非支配方案列表 { assignment, vector }

    // ========================== 工具函数 ==========================

    /**
     * 解析 data.json 中的车组条目。
     * 格式兼容：字符串（直接返回）、数组（取第一元素）、含 '/' 的多选一组合。
     * @param {string|string[]|Object} cell - data.json 中的一条选车数据
     * @returns {string[]} 车名数组（一般长度为 1，遇到 "狼崽/火山" 格式时为多选）
     */
    function parseCarGroup(cell) {
        const name = Array.isArray(cell) ? cell[0] : (typeof cell === 'object' && cell !== null ? cell.车 : cell);
        if (typeof name === 'string' && name.includes('/')) {
            return name.split('/').map(s => s.trim());
        }
        return [name];
    }

    /** 获取当前模式的车列表 */
    function getCurrentCarList() {
        return currentZone === 'zone4' ? zone4Cars : zone5Cars;
    }

    /**
     * 纯函数：按搜索关键字过滤车辆列表（支持昵称和真车名）。
     * @param {string[]} carList - 车昵称列表
     * @param {string} query - 搜索关键字
     * @returns {string[]} 过滤结果
     */
    function filterBySearch(carList, query) {
        if (!query) return [...carList];
        const q = query.toLowerCase();
        return carList.filter(car =>
            car.includes(query) ||
            (nickToName[car] && nickToName[car].toLowerCase().includes(q))
        );
    }

    /**
     * 纯函数：按性能等级过滤车辆列表。
     * @param {string[]} carList - 车昵称列表
     * @param {string|null} cls - 等级标识 'S'|'A'|'B'|'C'|'D'|'R' 或 null（全部）
     * @returns {string[]}
     */
    function filterByClass(carList, cls) {
        if (!cls) return [...carList];
        return carList.filter(car => {
            const stats = carStats[nickToName[car]];
            return stats && stats.class === cls;
        });
    }

    /**
     * 纯函数：对车辆列表排序。
     * @param {string[]} carList - 车昵称列表
     * @param {string} mode - 'alpha' | 'score-desc' | 'score-asc'
     * @returns {string[]} 排序后的新数组
     */
    function sortCarList(carList, mode) {
        const sorted = [...carList];
        if (mode === 'score-desc') {
            sorted.sort((a, b) => (carStats[nickToName[b]]?.score ?? 0) - (carStats[nickToName[a]]?.score ?? 0));
        } else if (mode === 'score-asc') {
            sorted.sort((a, b) => (carStats[nickToName[a]]?.score ?? 0) - (carStats[nickToName[b]]?.score ?? 0));
        } else {
            sorted.sort((a, b) => a.localeCompare(b, 'zh'));
        }
        return sorted;
    }

    // ========================== 数据加载与索引 ==========================

    // 车池由上方硬编码 ZONE5_CARS / ZONE4_CARS 定义

    // 构建地图索引
    function buildMapIndex() {
        if (!RACE_DATA || !RACE_DATA.擂台选车表) return;
        const bigSet = new Set();
        const map = {};
        RACE_DATA.擂台选车表.forEach(item => {
            const big = item.大地图;
            const small = item.小地图;
            const zone5Entries = item.五区 || [];
            const zone4Entries = item.四区 || [];
            const orderGroups = zone5Entries.map(entry => parseCarGroup(entry));
            const zone4OrderGroups = zone4Entries.map(entry => parseCarGroup(entry));
            bigSet.add(big);
            if (!map[big]) map[big] = [];
            map[big].push({
                name: small,
                orderGroups,
                zone4OrderGroups,
                zone5Entries,   // 保留原始数据供成绩查询
                zone4Entries
            });
        });
        bigMapList = Array.from(bigSet).sort();
        smallMapsByBig = map;
    }

    /**
     * 查询某辆车在某小地图上的具体成绩。
     * data.json 中每组的第二元素（如有）即为该车的成绩值。
     * @param {string} big - 大地图名
     * @param {string} small - 小地图名
     * @param {string} carName - 车昵称
     * @param {string} zone - 'zone5' | 'zone4'
     * @returns {string|null} 成绩字符串，或 null
     */
    function getCarScore(big, small, carName, zone) {
        const list = smallMapsByBig[big];
        if (!list) return null;
        const found = list.find(item => item.name === small);
        if (!found) return null;
        const entries = zone === 'zone4' ? found.zone4Entries : found.zone5Entries;
        for (const entry of entries) {
            const cars = parseCarGroup(entry);
            if (cars.includes(carName)) {
                return Array.isArray(entry) && entry.length > 1 ? entry[1] : null;
            }
        }
        return null;
    }

    // ========================== 界面渲染 ==========================

    // 渲染地图行
    function renderMapRows() {
        mapRowsContainer.innerHTML = '';
        bigSelects = [];
        smallSelects = [];
        for (let i = 0; i < ROWS; i++) {
            const rowDiv = document.createElement('div');
            rowDiv.className = 'map-row';
            rowDiv.innerHTML = `
                <div class="map-index">${i+1}</div>
                <div class="map-select-group">
                    <div class="select-wrapper">
                        <label>🏞️ 大地图</label>
                        <select class="big-map-select" data-index="${i}"></select>
                    </div>
                    <div class="select-wrapper">
                        <label>🗺️ 小地图</label>
                        <select class="small-map-select" data-index="${i}" disabled></select>
                    </div>
                </div>
            `;
            mapRowsContainer.appendChild(rowDiv);
            const bigSel = rowDiv.querySelector('.big-map-select');
            const smallSel = rowDiv.querySelector('.small-map-select');
            bigSelects.push(bigSel);
            smallSelects.push(smallSel);
        }
    }

    // 刷新大地图选项(互斥避免同一大地图重复)
    function refreshBigMaps() {
        const oldBigValues = bigSelects.map(sel => sel.value);
        const oldSmallValues = smallSelects.map(sel => sel.value);
        const currentSelectedBigs = oldBigValues.filter(v => v !== '');

        bigSelects.forEach((sel, idx) => {
            const oldVal = oldBigValues[idx];
            sel.innerHTML = '';
            const emptyOpt = document.createElement('option');
            emptyOpt.value = '';
            emptyOpt.textContent = '-- 选择大地图 --';
            sel.appendChild(emptyOpt);
            bigMapList.forEach(big => {
                const opt = document.createElement('option');
                opt.value = big;
                opt.textContent = big;
                const usedCount = currentSelectedBigs.filter(v => v === big).length;
                const isSelf = (oldVal === big);
                if (!isSelf && usedCount > 0) opt.disabled = true;
                sel.appendChild(opt);
            });
            if (oldVal && Array.from(sel.options).some(opt => opt.value === oldVal && !opt.disabled)) {
                sel.value = oldVal;
            } else {
                sel.value = '';
            }
        });

        bigSelects.forEach((sel, idx) => {
            const newBig = sel.value;
            const oldSmall = oldSmallValues[idx];
            updateSmallMapSelect(idx, newBig, oldSmall);
        });
    }

    // 更新小地图下拉
    function updateSmallMapSelect(index, bigMap, oldSmall) {
        const smallSel = smallSelects[index];
        smallSel.innerHTML = '';
        if (!bigMap || !smallMapsByBig[bigMap]) {
            smallSel.disabled = true;
            const opt = document.createElement('option');
            opt.textContent = '❌ 先选大地图';
            smallSel.appendChild(opt);
            return;
        }
        smallSel.disabled = false;
        const emptyOpt = document.createElement('option');
        emptyOpt.value = '';
        emptyOpt.textContent = '-- 选择小地图 --';
        smallSel.appendChild(emptyOpt);
        const smallList = smallMapsByBig[bigMap];
        smallList.forEach(sm => {
            const opt = document.createElement('option');
            opt.value = sm.name;
            opt.textContent = sm.name;
            smallSel.appendChild(opt);
        });
        if (oldSmall && smallList.some(sm => sm.name === oldSmall)) {
            smallSel.value = oldSmall;
        } else {
            smallSel.value = '';
        }
    }

    // --- 车库持久化 ---
    function saveGarage() {
        try { localStorage.setItem('garageCars', JSON.stringify([...selectedCars])); } catch(e) {}
        saveZoneMode();
    }
    function saveZoneMode() {
        try { localStorage.setItem('zoneMode', currentZone); } catch(e) {}
    }
    function loadGarage() {
        try {
            const stored = localStorage.getItem('garageCars');
            if (stored) {
                const arr = JSON.parse(stored);
                if (Array.isArray(arr)) { arr.forEach(c => selectedCars.add(c)); }
            }
        } catch(e) {}
        try {
            const savedZone = localStorage.getItem('zoneMode');
            if (savedZone === 'zone4' || savedZone === 'zone5') currentZone = savedZone;
        } catch(e) {}
        // 首次加载无数据时默认全选当前区
        if (selectedCars.size === 0) {
            const carList = getCurrentCarList();
            carList.forEach(c => selectedCars.add(c));
            saveGarage();
        }
    }

    /**
     * 更新车库区域标题、排序/等级按钮的 UI 状态。
     */
    function updateGarageUI() {
        const isZone4 = currentZone === 'zone4';
        const sortBtn = document.getElementById('sortBtn');
        if (sortBtn) {
            const labels = { 'alpha': '🔤 字母', 'score-desc': '📉 分↓', 'score-asc': '📈 分↑' };
            sortBtn.textContent = labels[sortMode] || sortMode;
        }

        document.querySelectorAll('.class-filter-btn').forEach(btn => {
            const cls = btn.dataset.class || null;
            btn.classList.toggle('active', cls === filterClass);
        });

        const filterSuffix = filterClass ? ` [${filterClass}]` : '';
        const totalLabel = isZone4
            ? `🚘 我的车库 (${[...selectedCars].filter(c => zone4Cars.includes(c)).length}/${zone4Cars.length}) 🔄四区${filterSuffix}`
            : `🚘 我的车库 (${selectedCars.size}/${zone5Cars.length}) 🏁五区${filterSuffix}`;
        document.getElementById('garageTitle').textContent = totalLabel;

    /** 渲染车库车辆标签网格 */
    function renderCarTags() {
        const carList = getCurrentCarList();
        const filtered = sortCarList(
            filterByClass(
                filterBySearch(carList, searchQuery),
                filterClass
            ),
            sortMode
        );

        carGrid.innerHTML = '';
        if (filtered.length === 0) {
            const msg = document.createElement('div');

            msg.textContent = `❌ 未找到"${searchQuery}"`;

    /** 处理车库标签点击（通过 carGrid 事件委托） */
    function onCarTagClick(e) {
        const tag = e.target.closest('.car-tag');
        if (!tag || !tag.dataset.carNick) return;
        const car = tag.dataset.carNick;
        if (selectedCars.has(car)) selectedCars.delete(car);

        saveGarage();
        updateGarageUI();
        renderCarTags();

    function renderGarage() {
        updateGarageUI();
        renderCarTags();
    }

    /** 全部点亮（搜索模式下只影响可见车辆） */
    function selectAll() {
        const carList = getCurrentCarList();
        const targets = filterBySearch(carList, searchQuery);
        targets.forEach(c => selectedCars.add(c));
        renderGarage();
    }
    function clearAll() { selectedCars.clear(); renderGarage(); }

    // =======================================================================
    //  核心算法
    //  三步法：
    //    1) 预计算每张图的候选车组 + 车→优先级映射
    //    2) 回溯枚举所有可行的不重复分配
    //    3) 帕累托非支配过滤，保留不可被全面超越的方案
    // =======================================================================

    /**
     * 获取某地图的选车推荐组。
     * 组索引 = 优先级等级（越小越优）;
     * 四区模式优先使用 data.json 中的四区数据，回退时按 ZONE4_CARS 过滤。
     */
    function getOriginalGroups(big, small, zone) {
        const list = smallMapsByBig[big];
        if (!list) return null;
        const found = list.find(item => item.name === small);
        if (!found) return null;
        if (zone === 'zone4' && found.zone4OrderGroups && found.zone4OrderGroups.length > 0) {
            return found.zone4OrderGroups;
        }
        return found.orderGroups;
    }

    /** 默认无车优先级标记（100 以内，远大于实际优先级值） */
    const NO_CAR_PRIORITY = 99;

    /**
     * 帕累托非支配比较：方案 A 支配 B ⟺ A 各维度不差于 B 且至少一维严格更优。
     * 此处维度 = 各图的优先级数值（越小越好）。
     */
    function dominates(aVec, bVec) {
        let atLeastOneBetter = false;
        for (let i = 0; i < aVec.length; i++) {
            if (aVec[i] > bVec[i]) return false;
            if (aVec[i] < bVec[i]) atLeastOneBetter = true;
        }
        return atLeastOneBetter;
    }

    /**
     * 核心：生成所有可行方案 → 帕累托非支配过滤。
     *
     * 1) 预计算每图的候选车组 + 车→优先级映射
     * 2) 回溯递归，保证一车不重复用
     * 3) 对枚举结果执行帕累托非支配过滤
     */
    function generateParetoSchemes(validMaps, ownedSet, maxSchemesLimit = 20) {
        const n = validMaps.length;
        if (n === 0) return [];

        // 1. 预计算每张图的数据:候选组、车→优先级映射
        const mapsData = [];
        for (let i = 0; i < n; i++) {
            const { big, small } = validMaps[i];
            const originalGroups = getOriginalGroups(big, small, currentZone);
            if (!originalGroups) return [];

            // 过滤候选:每组只保留拥有的车
            const filteredGroups = originalGroups.map(group => group.filter(car => ownedSet.has(car)));
            // 车->优先级 (组索引)
            const carToPriority = new Map();
            for (let gIdx = 0; gIdx < originalGroups.length; gIdx++) {
                const group = originalGroups[gIdx];
                for (const car of group) {
                    if (!carToPriority.has(car)) {
                        carToPriority.set(car, gIdx);
                    }
                }
            }
            mapsData.push({ filteredGroups, carToPriority });
        }

        // ---- 2. 回溯枚举所有可行分配（车不重复） ----
        const allSchemes = [];    // { assignment: string[], vector: number[] }
        const usedCars = new Set();
        const curAssign = new Array(n).fill(null);
        const curVector = new Array(n).fill(NO_CAR_PRIORITY);

        /**
         * 递归回溯。按地图顺序逐一尝试可用车辆，保证同一辆车不重复分配。
         * 剪枝：某图无可用车时直接返回（此路不通）。
         */
        function backtrack(idx) {
            if (idx === n) {
                allSchemes.push({
                    assignment: [...curAssign],
                    vector: [...curVector]
                });
                return;
            }
            const { filteredGroups, carToPriority } = mapsData[idx];
            if (filteredGroups.length === 0) return;  // 该图无可用车

            for (let g = 0; g < filteredGroups.length; g++) {
                const group = filteredGroups[g];
                if (group.length === 0) continue;
                for (const car of group) {
                    if (!usedCars.has(car)) {
                        const prio = carToPriority.get(car) ?? NO_CAR_PRIORITY;
                        usedCars.add(car);
                        curAssign[idx] = car;
                        curVector[idx] = prio;
                        backtrack(idx + 1);
                        usedCars.delete(car);
                        curAssign[idx] = null;
                        curVector[idx] = NO_CAR_PRIORITY;
                    }
                }
            }
        }

        backtrack(0);
        if (allSchemes.length === 0) return [];

        // ---- 3. 帕累托非支配过滤（前沿构建） ----
        const paretoFront = [];
        for (const scheme of allSchemes) {
            let dominated = false;
            for (let i = 0; i < paretoFront.length; i++) {
                if (dominates(paretoFront[i].vector, scheme.vector)) {
                    dominated = true;
                    break;
                }
            }
            if (!dominated) {
                const newFront = [];
                for (const existing of paretoFront) {
                    if (!dominates(scheme.vector, existing.vector)) {
                        newFront.push(existing);
                    }
                }
                newFront.push(scheme);
                paretoFront.length = 0;
                paretoFront.push(...newFront);
            }
        }

        // 按优先级向量字典序排序
        paretoFront.sort((a, b) => {
            for (let i = 0; i < n; i++) {
                if (a.vector[i] !== b.vector[i]) return a.vector[i] - b.vector[i];
            }
            return 0;
        });

        const finalSchemes = paretoFront.slice(0, maxSchemesLimit);

        // 将 assignment 扩展为全长 ROWS 的数组(未选地图位置为 null)
        const extended = finalSchemes.map(scheme => {
            const fullAssign = new Array(ROWS).fill(null);
            const fullVec = new Array(ROWS).fill(null);
            for (let i = 0; i < n; i++) {
                const origIdx = validMaps[i].originalIndex;
                fullAssign[origIdx] = scheme.assignment[i];
                fullVec[origIdx] = scheme.vector[i];
            }
            return { assignment: fullAssign, vector: fullVec };
        });

        return extended;
    }

    /** 计算方案的总优先级分（累加所有非空行，越小越优） */
    function getTotalScore(scheme) {
        if (!scheme || !scheme.vector) return 0;
        return scheme.vector.reduce((s, v) => s + (v !== null ? v : 0), 0);
    }

    // 获取当前有效地图列表
    function getCurrentValidMaps() {
        const maps = [];
        for (let i = 0; i < ROWS; i++) {
            const big = bigSelects[i].value;
            const small = smallSelects[i].value;
            if (big && small) {
                maps.push({ big, small, originalIndex: i });
            }
        }
        return maps;
    }



    /** 渲染无可用方案时的空状态 */
    function renderEmptyResult() {
        let html = '';
        for (let i = 0; i < ROWS; i++) {
            const big = bigSelects[i]?.value;
            const small = smallSelects[i]?.value;
            if (big && small) {
                html += `<div class="result-item"><div class="result-map">${small}</div><div class="result-bigmap">${big}</div><div class="result-car empty">🚫 无法分配</div></div>`;
            } else if (bigSelects[i]?.value || smallSelects[i]?.value) {
                html += `<div class="result-item"><div class="result-map">未选完整</div><div class="result-bigmap">--</div><div class="result-car empty">⛔ 缺地图</div></div>`;
            } else {
                html += `<div class="result-item"><div class="result-map">第${i+1}图</div><div class="result-bigmap">未选</div><div class="result-car empty">⚡ 待选图</div></div>`;
            }
        }
        resultGrid.innerHTML = html;
    }

    /**
     * 渲染单个方案的结果网格。
     * 每列显示：小地图名、大地图名、分配车辆、成绩值、优先级等级。
     * 底部显示总优先级分。
     */
    function renderResultGrid(scheme) {
        if (!scheme) {
            renderEmptyResult();
            return;
        }

        const totalScore = getTotalScore(scheme);
        let html = '';
        for (let i = 0; i < ROWS; i++) {
            const big = bigSelects[i].value;
            const small = smallSelects[i].value;
            if (big && small) {
                const car = scheme.assignment[i];
                const prio = scheme.vector[i];
                if (car) {
                    const score = getCarScore(big, small, car, currentZone);
                    const scoreHtml = score !== null && score !== undefined
                        ? `<div class="result-score">⏱ ${score}</div>`
                        : '';
                    html += `<div class="result-item">
                        <div class="result-map">${small}</div>
                        <div class="result-bigmap">${big}</div>
                        <div class="result-car">🏎️ ${car}</div>
                        ${scoreHtml}
                        <div class="priority-badge">⭐ 优先级 ${prio}</div>
                    </div>`;
                } else {
                    html += `<div class="result-item">
                        <div class="result-map">${small}</div>
                        <div class="result-bigmap">${big}</div>
                        <div class="result-car empty">❌ 无可用车</div>
                    </div>`;
                }
            } else {
                html += `<div class="result-item">
                    <div class="result-map">第${i+1}位</div>
                    <div class="result-bigmap">未选地图</div>
                    <div class="result-car empty">⛔ 未配置</div>
                </div>`;
            }
        }
        html += `<div class="result-score" style="grid-column:1/-1;">📊 当前方案总优先级分：${totalScore}（越小越优）</div>`;
        resultGrid.innerHTML = html;
    }

    // 更新下拉菜单及显示
    function updateUIWithSchemes(schemes) {
        currentBestSchemes = schemes;
        schemeSelect.innerHTML = '';
        if (currentBestSchemes.length === 0) {
            const opt = document.createElement('option');
            opt.textContent = '😭 无可分配方案(请检查车库是否拥有必要车辆)';
            opt.value = '-1';
            schemeSelect.appendChild(opt);
            schemeSelect.disabled = true;
            schemeCountBadge.textContent = '0';
            renderResultGrid(null);
            return;
        }

        schemeSelect.disabled = false;
        schemeCountBadge.textContent = currentBestSchemes.length;
        currentBestSchemes.forEach((scheme, idx) => {
            const parts = [];
            let totalScore = 0;
            for (let i = 0; i < ROWS; i++) {
                if (bigSelects[i].value && smallSelects[i].value) {
                    const car = scheme.assignment[i] || '?';
                    const prio = scheme.vector[i] !== null ? scheme.vector[i] : '—';
                    parts.push(`${i+1}:${car}(${prio})`);
                    if (scheme.vector[i] !== null) totalScore += scheme.vector[i];
                }
            }
            const vectorStr = scheme.vector.filter(v => v !== null).join(',');
            const option = document.createElement('option');
            option.value = idx;
            option.textContent = `🏆 方案${idx+1}  [${vectorStr}]  Σ=${totalScore}  | ${parts.join(' ')}`;
            schemeSelect.appendChild(option);
        });
        schemeSelect.value = 0;
        renderResultGrid(currentBestSchemes[0]);
    }

    /** 方案数量上限 */
    const SCHEME_LIMIT = 25;

    /**
     * 主控：根据当前地图选择 + 车库状态，生成帕累托最优方案并渲染。
     * 无地图选中时显示提示；有地图时异步计算（延迟一帧给加载动画时间）。
     * 结果按总优先级分升序排列。
     */
    function computeAndDisplay() {
        const validMaps = getCurrentValidMaps();
        if (validMaps.length === 0) {
            loadingOverlay.classList.remove('show');
            currentBestSchemes = [];
            schemeSelect.innerHTML = '';
            const opt = document.createElement('option');
            opt.textContent = '⚠️ 请至少选择一张地图';
            opt.disabled = true;
            schemeSelect.appendChild(opt);
            schemeSelect.disabled = true;
            schemeCountBadge.textContent = '0';
            resultGrid.innerHTML = `<div style="grid-column:1/-1; text-align:center; color:#8f9bcb;">未选择任何地图,请先选择大地图与小地图</div>`;
            return;
        }

        loadingOverlay.classList.add('show');
        // 用 requestAnimationFrame 延迟一帧，确保 loading 动画先渲染
        requestAnimationFrame(() => {
            setTimeout(() => {
                const paretoSchemes = generateParetoSchemes(validMaps, selectedCars, SCHEME_LIMIT);
                paretoSchemes.sort((a, b) => getTotalScore(a) - getTotalScore(b));
                loadingOverlay.classList.remove('show');
                updateUIWithSchemes(paretoSchemes);
            }, 0);
        });
    }

    // 事件绑定
    function bindEvents() {
        bigSelects.forEach(sel => sel.addEventListener('change', () => { refreshBigMaps(); computeAndDisplay(); }));
        smallSelects.forEach(sel => sel.addEventListener('change', computeAndDisplay));
        recommendBtn.addEventListener('click', computeAndDisplay);
        selectAllBtn.addEventListener('click', () => { selectAll(); computeAndDisplay(); });
        clearAllBtn.addEventListener('click', () => { clearAll(); computeAndDisplay(); });

        // 排序按钮循环: 字母顺序 → 分数降序 → 分数升序
        document.getElementById('sortBtn').addEventListener('click', () => {
            const SORT_CYCLE = ['alpha', 'score-desc', 'score-asc'];
            const idx = SORT_CYCLE.indexOf(sortMode);
            sortMode = SORT_CYCLE[(idx + 1) % SORT_CYCLE.length];
            renderGarage();
        });

        // 等级筛选按钮
        document.getElementById('classFilter').addEventListener('click', (e) => {
            const btn = e.target.closest('.class-filter-btn');
            if (!btn) return;
            const cls = btn.dataset.class || null;
            filterClass = cls;
            renderGarage();
        });

        // 车库标签点击使用事件委托（避免每个标签绑定独立监听器）
        carGrid.addEventListener('click', onCarTagClick);

        const searchInput = document.getElementById('garageSearch');
        searchInput.addEventListener('input', () => {
            searchQuery = searchInput.value.trim();
            renderGarage();
        });
        schemeSelect.addEventListener('change', (e) => {
            const idx = parseInt(e.target.value, 10);
            if (!isNaN(idx) && idx >= 0 && idx < currentBestSchemes.length) {
                renderResultGrid(currentBestSchemes[idx]);
            }
        });
    }

    // 四区/五区切换
    function initZoneToggle() {
        const labels = document.querySelectorAll('#zoneToggle label');
        labels.forEach(label => {
            label.addEventListener('click', () => {
                const zone = label.dataset.zone;
                if (zone === currentZone) return;
                currentZone = zone;
                saveZoneMode();
                // 更新toggle样式
                labels.forEach(l => {
                    l.className = l.dataset.zone === currentZone ? 'active' : 'inactive';
                });
                // 切换到四区时，清除不在四区车池里的车
                if (currentZone === 'zone4') {
                    let changed = false;
                    for (const car of selectedCars) {
                        if (!zone4Cars.includes(car)) {
                            selectedCars.delete(car);
                            changed = true;
                        }
                    }
                    if (changed) saveGarage();
                }
                // 重渲染
                renderGarage();
                computeAndDisplay();
            });
        });
        // 设置初始样式
        labels.forEach(l => {
            l.className = l.dataset.zone === currentZone ? 'active' : 'inactive';
        });
    }

    /**
     * 应用入口。初始化顺序：
     *   data.json 加载 → 地图索引构建 → cars.json 加载（可选）
     *   → 车库持久化恢复 → UI 渲染 → 事件绑定 → 首次计算
     */
    async function initApp() {
        try {
            const response = await fetch('data.json');
            if (!response.ok) throw new Error(`HTTP ${response.status}`);
            RACE_DATA = await response.json();
            buildMapIndex();          // 建地图索引

            // 加载车辆度量数据 (cars.json)
            try {
                const carResp = await fetch('cars.json');
                if (carResp.ok) {
                    const carData = await carResp.json();
                    carStats = {};
                    nickToName = {};
                    for (const c of carData.cars) {
                        carStats[c.title] = c;
                    }
                    Object.assign(nickToName, carData._nickname_map);
                }
            } catch(e) {
                console.warn('cars.json 加载失败, 搜索/排序降级:', e.message);
            }

            loadGarage();             // 加载车库（现在 zone5Cars/zone4Cars 已就绪）
            renderMapRows();
            renderGarage();
            refreshBigMaps();
            bindEvents();
            initZoneToggle();
            computeAndDisplay();
        } catch (err) {
            mapRowsContainer.innerHTML = `<div class="loading" style="color:#f99;padding:30px;">❌ 加载失败: ${err.message}<br>请确保 data.json 文件存在且格式正确</div>`;
            console.error(err);
        }
    }

    initApp();
})();
</script>
</body>
</html>
